<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8BC34A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="80" fill="#1a1a1a"/>
  
  <!-- Wortell text -->
  <text x="100" y="30" fill="url(#greenGrad)" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold">WORTELL</text>
  
  <!-- Enterprise Security text -->
  <text x="100" y="50" fill="url(#greenGrad)" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal">ENTERPRISE SECURITY</text>
  
  <!-- Decorative elements -->
  <line x1="20" y1="35" x2="180" y2="35" stroke="url(#greenGrad)" stroke-width="1"/>
  <circle cx="25" cy="35" r="2" fill="url(#greenGrad)"/>
  <circle cx="175" cy="35" r="2" fill="url(#greenGrad)"/>
</svg>